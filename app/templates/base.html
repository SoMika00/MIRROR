<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MIRROR{% endblock %} · Michail Berjaoui</title>
    <meta name="description" content="{% block meta_description %}Michail Berjaoui — Lead AI/LLM Engineer. Enterprise RAG, LLM fine-tuning, MLOps. Portfolio with a live AI assistant.{% endblock %}">
    <link rel="canonical" href="https://mymirror.fr{{ request.path }}">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="MIRROR — Michail Berjaoui">
    <meta property="og:title" content="{{ self.title() }} · Michail Berjaoui">
    <meta property="og:description" content="{{ self.meta_description() }}">
    <meta property="og:url" content="https://mymirror.fr{{ request.path }}">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ self.title() }} · Michail Berjaoui">
    <meta name="twitter:description" content="{{ self.meta_description() }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Michail Berjaoui",
      "jobTitle": "Lead AI/LLM Engineer",
      "email": "mailto:michail.berjaoui@gmail.com",
      "url": "https://mymirror.fr",
      "sameAs": ["https://www.linkedin.com/in/mickail-berjaoui-02776b193"],
      "address": {"@type": "PostalAddress", "addressLocality": "Tokyo", "addressCountry": "JP"},
      "knowsAbout": ["Retrieval-Augmented Generation", "LLM fine-tuning", "MLOps", "Machine Learning", "Kubernetes"],
      "knowsLanguage": ["fr", "en", "ja"]
    }
    </script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">
            <div class="logo-icon">M</div>
            <span>MIRROR</span>
        </a>
        <ul class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}" data-i18n="nav.portfolio">Portfolio</a>
            <a href="/chat" class="{% if request.path == '/chat' %}active{% endif %}" data-i18n="nav.chat">AI Chat</a>
            <a href="/articles" class="{% if request.path.startswith('/articles') %}active{% endif %}" data-i18n="nav.articles">Articles</a>
            <a href="/courses" class="{% if request.path == '/courses' %}active{% endif %}" data-i18n="nav.courses">Courses</a>
            <a href="/tech" class="{% if request.path == '/tech' %}active{% endif %}" data-i18n="nav.tech">Architecture</a>
        </ul>
        <div class="nav-status">
            <div class="lang-switch" id="langSwitch">
                <button class="lang-bubble" id="langBubble" type="button" aria-haspopup="true" aria-expanded="false">
                    <span class="lang-bubble-label" id="langBubbleLabel">EN</span>
                </button>
                <div class="lang-menu" id="langMenu" role="menu" aria-label="Language">
                    <button class="lang-menu-item" type="button" data-lang="fr" role="menuitem">FR</button>
                    <button class="lang-menu-item" type="button" data-lang="en" role="menuitem">EN</button>
                    <button class="lang-menu-item" type="button" data-lang="ja" role="menuitem">日本語</button>
                </div>
            </div>
            <span class="status-dot offline" id="statusDot" title="Services status"></span>
        </div>
    </nav>

    <div class="page-container">
        {% block content %}{% endblock %}
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
