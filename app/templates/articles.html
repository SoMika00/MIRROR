{% extends "base.html" %}
{% block title %}Articles{% endblock %}

{% block content %}
<section class="section">
    <div class="container" style="max-width:1080px;">
        <h1 class="text-center mb-1" style="font-size:2rem;font-weight:800;" data-i18n="articles.title">Articles</h1>
        <p class="text-center text-muted mb-3" data-i18n="articles.subtitle">Technical writing on AI, RAG, MLOps and production systems.</p>

        <div class="articles-grid" id="articlesGrid">
            <div class="text-center text-muted" style="grid-column:1/-1;" data-i18n="articles.loading">Loading articles...</div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', loadArticles);
window.addEventListener('mirror-lang-changed', () => loadArticles());

function getCurrentLang() {
    try {
        return localStorage.getItem('mirror_lang') || '';
    } catch (e) {
        return '';
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function loadArticles() {
    try {
        const lang = encodeURIComponent(getCurrentLang());
        const resp = await fetch(`/api/articles/list${lang ? `?lang=${lang}` : ''}`);
        const data = await resp.json();
        const grid = document.getElementById('articlesGrid');

        if (!data.articles || data.articles.length === 0) {
            grid.innerHTML = `
                <div class="text-center text-muted" style="grid-column:1/-1;">
                    <p style="font-size:1.2rem;margin-bottom:0.5rem;" data-i18n="articles.empty_title">No articles yet</p>
                    <p style="font-size:0.85rem;" data-i18n="articles.empty_hint">Add markdown files to the <code>articles/</code> directory to get started.</p>
                </div>`;
            if (window.MIRROR_I18N?.applyTranslations) {
                window.MIRROR_I18N.applyTranslations(window.MIRROR_I18N.getLang());
            }
            return;
        }

        const langParam = lang ? `?lang=${lang}` : '';
        grid.innerHTML = data.articles.map(a => `
            <a href="/articles/${a.id}${langParam}" class="card article-card" style="text-decoration:none;color:inherit;">
                <div class="card-header">
                    <div class="card-title">${escapeHtml(a.title)}</div>
                    <div class="card-date">${a.date || ''}</div>
                </div>
                <div class="card-body">${escapeHtml(a.summary || '')}</div>
                ${a.tags && a.tags.length ? `
                    <div class="article-tags">
                        ${a.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
                    </div>` : ''}
            </a>
        `).join('');

        if (window.MIRROR_I18N?.applyTranslations) {
            window.MIRROR_I18N.applyTranslations(window.MIRROR_I18N.getLang());
        }
    } catch (e) {
        document.getElementById('articlesGrid').innerHTML =
            '<div class="text-center text-muted" style="grid-column:1/-1;">Failed to load articles</div>';
    }
}
</script>
{% endblock %}
