services:
  caddy:
    image: caddy:2.8.4
    container_name: mirror-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mirror
    restart: unless-stopped

  mirror:
    build: .
    container_name: mirror-app
    expose:
      - "5000"
    volumes:
      - ./uploads:/app/uploads
      - ./articles:/app/articles
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - FLASK_DEBUG=0
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
